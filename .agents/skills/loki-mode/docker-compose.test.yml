version: "3.9"
services:
  purple-lab:
    build:
      context: .
      dockerfile: Dockerfile.purplelab-test
    ports:
      - "57375:57375"
    environment:
      - LOKI_HOME=/app/.loki
    volumes:
      - ./test-projects:/app/test-projects
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:57375/api/session/status"]
      interval: 3s
      timeout: 5s
      retries: 10

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test-runner
    depends_on:
      purple-lab:
        condition: service_healthy
    environment:
      - PURPLE_LAB_URL=http://purple-lab:57375
    volumes:
      - ./test-results:/results

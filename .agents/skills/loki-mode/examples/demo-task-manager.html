<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager - Loki Mode Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f3f4f6;--surface:#fff;--text:#111827;--muted:#6b7280;--primary:#7c3aed;--primary-hover:#6d28d9;--border:#e5e7eb;--col-todo:#fef3c7;--col-prog:#dbeafe;--col-done:#d1fae5;--danger:#ef4444;--shadow:0 1px 3px rgba(0,0,0,.1)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body.dark{--bg:#0f0e17;--surface:#1a1928;--text:#e5e5eb;--muted:#9ca3af;--border:#2d2b3d;--col-todo:#44403c;--col-prog:#1e3a5f;--col-done:#14532d;--shadow:0 1px 3px rgba(0,0,0,.3)}
header{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:var(--surface);border-bottom:1px solid var(--border)}
.logo{font-size:1.25rem;font-weight:700;color:var(--primary)}
.header-actions{display:flex;gap:.75rem}
.btn{padding:.5rem 1rem;border-radius:8px;border:none;cursor:pointer;font-size:.8rem;font-weight:500;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.board{display:flex;gap:1rem;padding:1.5rem;overflow-x:auto;min-height:calc(100vh - 160px)}
.column{flex:1;min-width:280px;max-width:400px;background:var(--surface);border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column}
.col-header{padding:1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.col-title{font-weight:600;font-size:.9rem;display:flex;align-items:center;gap:.5rem}
.col-count{background:var(--border);border-radius:10px;padding:.125rem .5rem;font-size:.7rem;color:var(--muted)}
.col-body{padding:.75rem;flex:1;overflow-y:auto;min-height:100px}
.col-body.drag-over{background:rgba(124,58,237,.08);border-radius:0 0 12px 12px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.75rem;margin-bottom:.5rem;cursor:grab;transition:all .15s;position:relative}
.card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.card.dragging{opacity:.4;transform:rotate(2deg)}
.card-title{font-size:.85rem;font-weight:600;margin-bottom:.25rem;padding-right:1.5rem}
.card-desc{font-size:.75rem;color:var(--muted);line-height:1.4}
.card-delete{position:absolute;top:.5rem;right:.5rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;opacity:0;transition:opacity .15s}
.card:hover .card-delete{opacity:1}
.card-delete:hover{background:var(--danger);color:#fff}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-overlay.visible{display:flex}
.modal{background:var(--surface);border-radius:12px;padding:1.5rem;width:90%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{margin-bottom:1rem;font-size:1rem}
.modal input,.modal textarea{width:100%;padding:.5rem .75rem;border:1px solid var(--border);border-radius:6px;margin-bottom:.75rem;font-size:.85rem;background:var(--bg);color:var(--text);font-family:inherit}
.modal textarea{resize:vertical;min-height:60px}
.modal-actions{display:flex;gap:.5rem;justify-content:flex-end}
.source-toggle{position:fixed;bottom:1rem;right:1rem;background:var(--primary);color:#fff;border:none;padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.75rem;z-index:10}
.source-section{display:none;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;margin:1rem;max-height:300px;overflow:auto}
.source-section.visible{display:block}
.source-section pre{font-size:.7rem;white-space:pre-wrap;word-break:break-all;color:var(--muted)}
footer{text-align:center;padding:1rem;color:var(--muted);font-size:.75rem}
@media(max-width:768px){.board{flex-direction:column}.column{max-width:none}}
</style>
</head>
<body>
<header>
  <div class="logo">TaskFlow</div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="toggleTheme()">Dark / Light</button>
    <button class="btn btn-primary" onclick="showModal()">+ New Task</button>
  </div>
</header>
<div class="board" id="board"></div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Add New Task</h3>
    <input id="taskTitle" placeholder="Task title" maxlength="80">
    <textarea id="taskDesc" placeholder="Description (optional)"></textarea>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="hideModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addTask()">Add Task</button>
    </div>
  </div>
</div>
<button class="source-toggle" onclick="toggleSource()">View Source</button>
<div class="source-section" id="sourceSection"><pre id="sourceCode"></pre></div>
<footer>Built with Loki Mode in ~3 minutes</footer>
<script>
const COLS=[
  {id:'todo',title:'To Do'},
  {id:'progress',title:'In Progress'},
  {id:'done',title:'Done'}
];
const DEFAULT_TASKS=[
  {id:'1',title:'Design landing page','desc':'Create wireframes and mockups for the new marketing site',col:'todo'},
  {id:'2',title:'Set up CI/CD pipeline','desc':'Configure GitHub Actions for automated testing and deployment',col:'todo'},
  {id:'3',title:'Implement auth system','desc':'OAuth2 + JWT token-based authentication',col:'progress'},
  {id:'4',title:'Database schema design','desc':'Define tables for users, projects, and tasks',col:'done'},
  {id:'5',title:'API rate limiting','desc':'Add rate limiter middleware to prevent abuse',col:'progress'}
];
let tasks=JSON.parse(localStorage.getItem('loki-tasks'))||DEFAULT_TASKS;
let draggedId=null;
function save(){localStorage.setItem('loki-tasks',JSON.stringify(tasks))}
function render(){
  const board=document.getElementById('board');
  board.innerHTML='';
  COLS.forEach(col=>{
    const colTasks=tasks.filter(t=>t.col===col.id);
    const div=document.createElement('div');
    div.className='column';
    div.innerHTML=`<div class="col-header"><div class="col-title">${col.title} <span class="col-count">${colTasks.length}</span></div></div><div class="col-body" data-col="${col.id}"></div>`;
    const body=div.querySelector('.col-body');
    body.addEventListener('dragover',e=>{e.preventDefault();body.classList.add('drag-over')});
    body.addEventListener('dragleave',()=>body.classList.remove('drag-over'));
    body.addEventListener('drop',e=>{
      e.preventDefault();body.classList.remove('drag-over');
      if(draggedId){const t=tasks.find(x=>x.id===draggedId);if(t){t.col=col.id;save();render()}}
    });
    colTasks.forEach(t=>{
      const card=document.createElement('div');
      card.className='card';card.draggable=true;card.dataset.id=t.id;
      card.innerHTML=`<div class="card-title">${esc(t.title)}</div>${t.desc?`<div class="card-desc">${esc(t.desc)}</div>`:''}<button class="card-delete" title="Delete task">x</button>`;
      card.addEventListener('dragstart',()=>{draggedId=t.id;card.classList.add('dragging')});
      card.addEventListener('dragend',()=>{draggedId=null;card.classList.remove('dragging')});
      card.querySelector('.card-delete').addEventListener('click',()=>{tasks=tasks.filter(x=>x.id!==t.id);save();render()});
      body.appendChild(card);
    });
    board.appendChild(div);
  });
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function showModal(){document.getElementById('modal').classList.add('visible');document.getElementById('taskTitle').focus()}
function hideModal(){document.getElementById('modal').classList.remove('visible');document.getElementById('taskTitle').value='';document.getElementById('taskDesc').value=''}
function addTask(){
  const title=document.getElementById('taskTitle').value.trim();
  if(!title)return;
  tasks.push({id:Date.now().toString(),title,desc:document.getElementById('taskDesc').value.trim(),col:'todo'});
  save();render();hideModal();
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')hideModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')hideModal()});
if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches){document.body.classList.add('dark')}
function toggleTheme(){document.body.classList.toggle('dark')}
function toggleSource(){
  const s=document.getElementById('sourceSection');s.classList.toggle('visible');
  if(s.classList.contains('visible')&&!s.dataset.loaded){document.getElementById('sourceCode').textContent=document.documentElement.outerHTML;s.dataset.loaded='1'}
}
render();
</script>
</body>
</html>

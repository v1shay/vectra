<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat App - Loki Mode Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f3f4f6;--surface:#fff;--text:#111827;--muted:#6b7280;--primary:#7c3aed;--primary-hover:#6d28d9;--border:#e5e7eb;--user-bg:#7c3aed;--user-text:#fff;--bot-bg:#e5e7eb;--bot-text:#111827;--shadow:0 1px 3px rgba(0,0,0,.08)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
body.dark{--bg:#0f0e17;--surface:#1a1928;--text:#e5e5eb;--muted:#9ca3af;--border:#2d2b3d;--bot-bg:#2d2b3d;--bot-text:#e5e5eb;--shadow:0 1px 3px rgba(0,0,0,.3)}
header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.chat-header-left{display:flex;align-items:center;gap:.75rem}
.chat-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#0d9488);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.75rem;font-weight:700}
.chat-name{font-weight:600;font-size:.9rem}
.chat-status{font-size:.7rem;color:#059669}
.btn-sm{padding:.375rem .75rem;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text);cursor:pointer;font-size:.75rem}
.messages{flex:1;overflow-y:auto;padding:1rem 1.5rem;display:flex;flex-direction:column;gap:.5rem}
.msg{display:flex;flex-direction:column;max-width:75%;animation:msgIn .25s ease-out}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.bot{align-self:flex-start;align-items:flex-start}
.msg-bubble{padding:.625rem 1rem;border-radius:16px;font-size:.875rem;line-height:1.5;word-wrap:break-word}
.msg.user .msg-bubble{background:var(--user-bg);color:var(--user-text);border-bottom-right-radius:4px}
.msg.bot .msg-bubble{background:var(--bot-bg);color:var(--bot-text);border-bottom-left-radius:4px}
.msg-time{font-size:.65rem;color:var(--muted);margin-top:.125rem;padding:0 .25rem}
.msg-sender{font-size:.7rem;font-weight:600;color:var(--muted);margin-bottom:.125rem;padding:0 .25rem}
.typing{display:flex;align-items:center;gap:.25rem;padding:.625rem 1rem;background:var(--bot-bg);border-radius:16px;border-bottom-left-radius:4px;align-self:flex-start;max-width:75%}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:typingBounce 1.4s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.input-area{padding:.75rem 1.5rem;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:.5rem;flex-shrink:0}
.input-area input{flex:1;padding:.625rem 1rem;border:1px solid var(--border);border-radius:20px;font-size:.875rem;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
.input-area input:focus{border-color:var(--primary)}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--primary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.send-btn:hover{background:var(--primary-hover)}
.send-btn svg{width:18px;height:18px;fill:#fff}
.source-toggle{position:fixed;bottom:5rem;right:1rem;background:var(--primary);color:#fff;border:none;padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.75rem;z-index:10}
.source-section{display:none;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;margin:1rem;max-height:300px;overflow:auto}
.source-section.visible{display:block}
.source-section pre{font-size:.7rem;white-space:pre-wrap;word-break:break-all;color:var(--muted)}
footer{text-align:center;padding:.5rem;color:var(--muted);font-size:.7rem;flex-shrink:0}
@media(max-width:600px){.messages{padding:.75rem}.msg{max-width:88%}}
</style>
</head>
<body>
<header>
  <div class="chat-header-left">
    <div class="chat-avatar">AI</div>
    <div>
      <div class="chat-name">Loki Assistant</div>
      <div class="chat-status">Online</div>
    </div>
  </div>
  <button class="btn-sm" onclick="toggleTheme()">Dark / Light</button>
</header>
<div class="messages" id="messages"></div>
<div class="input-area">
  <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
  <button class="send-btn" onclick="sendMessage()" aria-label="Send">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>
<button class="source-toggle" onclick="toggleSource()">View Source</button>
<div class="source-section" id="sourceSection"><pre id="sourceCode"></pre></div>
<footer>Built with Loki Mode in ~3 minutes</footer>
<script>
const messagesEl=document.getElementById('messages');
const input=document.getElementById('msgInput');
const botResponses=[
  "That's a great question! Let me think about that for a moment.",
  "I'd be happy to help with that. Here's what I suggest...",
  "Interesting point! Based on my analysis, I'd recommend a different approach.",
  "Got it. I've processed your request and here are the results.",
  "Thanks for sharing that. Let me provide some context on the topic.",
  "I understand what you're looking for. Here's a detailed breakdown.",
  "That's a common challenge. Here are some proven strategies to address it.",
  "Great idea! I can definitely help you implement that."
];
function getTime(){const d=new Date();return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
function addMessage(text,sender){
  const div=document.createElement('div');
  div.className=`msg ${sender}`;
  div.innerHTML=`${sender==='bot'?'<div class="msg-sender">Loki Assistant</div>':''}<div class="msg-bubble">${escHtml(text)}</div><div class="msg-time">${getTime()}</div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop=messagesEl.scrollHeight;
}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function showTyping(){
  const div=document.createElement('div');
  div.className='typing';div.id='typing-indicator';
  div.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop=messagesEl.scrollHeight;
}
function hideTyping(){const el=document.getElementById('typing-indicator');if(el)el.remove()}
function sendMessage(){
  const text=input.value.trim();
  if(!text)return;
  addMessage(text,'user');
  input.value='';
  showTyping();
  const delay=800+Math.random()*1500;
  setTimeout(()=>{
    hideTyping();
    addMessage(botResponses[Math.floor(Math.random()*botResponses.length)],'bot');
  },delay);
}
input.addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage()});
// Initial messages
const initMsgs=[
  {text:"Hello! I'm Loki Assistant. How can I help you today?",sender:'bot'},
  {text:"I need help building a web application.",sender:'user'},
  {text:"I'd be happy to help with that. What kind of app are you looking to build? I can help with SaaS dashboards, e-commerce, portfolios, and much more.",sender:'bot'}
];
initMsgs.forEach(m=>addMessage(m.text,m.sender));

if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches){document.body.classList.add('dark')}
function toggleTheme(){document.body.classList.toggle('dark')}
function toggleSource(){
  const s=document.getElementById('sourceSection');s.classList.toggle('visible');
  if(s.classList.contains('visible')&&!s.dataset.loaded){document.getElementById('sourceCode').textContent=document.documentElement.outerHTML;s.dataset.loaded='1'}
}
</script>
</body>
</html>

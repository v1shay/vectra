<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Store - Loki Mode Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f9fafb;--surface:#fff;--text:#111827;--muted:#6b7280;--primary:#7c3aed;--primary-hover:#6d28d9;--border:#e5e7eb;--star:#f59e0b;--shadow:0 1px 3px rgba(0,0,0,.08)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
body.dark{--bg:#0f0e17;--surface:#1a1928;--text:#e5e5eb;--muted:#9ca3af;--border:#2d2b3d;--shadow:0 1px 3px rgba(0,0,0,.3)}
header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 2rem;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.logo{font-size:1.2rem;font-weight:700;color:var(--primary)}
.header-right{display:flex;align-items:center;gap:1rem}
.cart-btn{display:flex;align-items:center;gap:.375rem;padding:.375rem .75rem;border-radius:8px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text);font-size:.8rem;position:relative}
.cart-count{background:var(--primary);color:#fff;font-size:.6rem;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:absolute;top:-6px;right:-6px}
.btn-sm{padding:.375rem .75rem;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text);cursor:pointer;font-size:.75rem}
.layout{display:flex;min-height:calc(100vh - 50px)}
.sidebar{width:240px;padding:1.5rem;border-right:1px solid var(--border);background:var(--surface);flex-shrink:0}
.sidebar h3{font-size:.85rem;font-weight:700;margin-bottom:.75rem}
.filter-group{margin-bottom:1.5rem}
.filter-group label{font-size:.8rem;font-weight:600;margin-bottom:.5rem;display:block;color:var(--muted)}
.filter-option{display:flex;align-items:center;gap:.5rem;padding:.25rem 0;cursor:pointer;font-size:.8rem}
.filter-option input[type=checkbox]{accent-color:var(--primary)}
.price-range{display:flex;gap:.5rem;align-items:center;margin-top:.5rem}
.price-range input{width:70px;padding:.3rem .5rem;border:1px solid var(--border);border-radius:4px;font-size:.75rem;background:var(--bg);color:var(--text)}
.price-range span{font-size:.75rem;color:var(--muted)}
.main-content{flex:1;padding:1.5rem}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.result-count{font-size:.85rem;color:var(--muted)}
.sort-select{padding:.375rem .75rem;border:1px solid var(--border);border-radius:6px;font-size:.8rem;background:var(--surface);color:var(--text);cursor:pointer}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.25rem}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .2s}
.product-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.product-img{height:180px;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--muted);position:relative}
.product-badge{position:absolute;top:.75rem;left:.75rem;background:var(--primary);color:#fff;font-size:.6rem;font-weight:600;padding:.2rem .5rem;border-radius:4px}
.product-body{padding:1rem}
.product-category{font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.25rem}
.product-name{font-size:.9rem;font-weight:600;margin-bottom:.25rem}
.product-rating{display:flex;align-items:center;gap:.25rem;margin-bottom:.5rem}
.star{width:14px;height:14px}
.rating-count{font-size:.7rem;color:var(--muted)}
.product-price{display:flex;align-items:center;justify-content:space-between;margin-top:.5rem}
.price{font-size:1.1rem;font-weight:700;color:var(--primary)}
.price-old{font-size:.8rem;color:var(--muted);text-decoration:line-through;margin-left:.375rem}
.add-btn{padding:.375rem .875rem;border-radius:6px;background:var(--primary);color:#fff;border:none;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .15s}
.add-btn:hover{background:var(--primary-hover)}
.add-btn.added{background:#059669}
.source-toggle{position:fixed;bottom:1rem;right:1rem;background:var(--primary);color:#fff;border:none;padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.75rem;z-index:10}
.source-section{display:none;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;margin:1rem;max-height:300px;overflow:auto}
.source-section.visible{display:block}
.source-section pre{font-size:.7rem;white-space:pre-wrap;word-break:break-all;color:var(--muted)}
footer{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.75rem;border-top:1px solid var(--border)}
@media(max-width:768px){.sidebar{display:none}.layout{flex-direction:column}}
</style>
</head>
<body>
<header>
  <div class="logo">ShopWave</div>
  <div class="header-right">
    <button class="btn-sm" onclick="toggleTheme()">Dark / Light</button>
    <button class="cart-btn" id="cartBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
      Cart <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>
<div class="layout">
  <aside class="sidebar">
    <h3>Filters</h3>
    <div class="filter-group">
      <label>Category</label>
      <div class="filter-option"><input type="checkbox" checked data-cat="all" onchange="filterProducts(event)"> All</div>
      <div class="filter-option"><input type="checkbox" data-cat="electronics" onchange="filterProducts(event)"> Electronics</div>
      <div class="filter-option"><input type="checkbox" data-cat="accessories" onchange="filterProducts(event)"> Accessories</div>
      <div class="filter-option"><input type="checkbox" data-cat="software" onchange="filterProducts(event)"> Software</div>
      <div class="filter-option"><input type="checkbox" data-cat="audio" onchange="filterProducts(event)"> Audio</div>
    </div>
    <div class="filter-group">
      <label>Price Range</label>
      <div class="price-range">
        <input type="number" id="priceMin" placeholder="0" value="0" onchange="filterProducts()">
        <span>to</span>
        <input type="number" id="priceMax" placeholder="500" value="500" onchange="filterProducts()">
      </div>
    </div>
  </aside>
  <main class="main-content">
    <div class="toolbar">
      <span class="result-count" id="resultCount">12 products</span>
      <select class="sort-select" id="sortSelect" onchange="sortProducts()">
        <option value="default">Sort by: Featured</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
        <option value="rating">Highest Rated</option>
      </select>
    </div>
    <div class="product-grid" id="productGrid"></div>
  </main>
</div>
<button class="source-toggle" onclick="toggleSource()">View Source</button>
<div class="source-section" id="sourceSection"><pre id="sourceCode"></pre></div>
<footer>Built with Loki Mode in ~3 minutes</footer>
<script>
const gradients=[
  '135deg,#7c3aed30,#0d948830','135deg,#0d948830,#06b6d430','135deg,#f59e0b30,#ef444430',
  '135deg,#ec489930,#7c3aed30','135deg,#3b82f630,#8b5cf630','135deg,#10b98130,#06b6d430'
];
const products=[
  {id:1,name:'Wireless Keyboard Pro',category:'electronics',price:79.99,rating:4.5,reviews:234,badge:null,gradient:0},
  {id:2,name:'USB-C Hub 7-in-1',category:'accessories',price:49.99,rating:4.7,reviews:189,badge:'Best Seller',gradient:1},
  {id:3,name:'Developer IDE License',category:'software',price:149.99,rating:4.8,reviews:512,badge:null,gradient:2},
  {id:4,name:'Noise-Cancel Headphones',category:'audio',price:199.99,oldPrice:249.99,rating:4.6,reviews:367,badge:'Sale',gradient:3},
  {id:5,name:'Mechanical Mouse',category:'electronics',price:59.99,rating:4.3,reviews:145,badge:null,gradient:4},
  {id:6,name:'Monitor Light Bar',category:'accessories',price:34.99,rating:4.4,reviews:98,badge:null,gradient:5},
  {id:7,name:'Cloud Storage Plan',category:'software',price:9.99,rating:4.2,reviews:890,badge:null,gradient:0},
  {id:8,name:'Bluetooth Speaker',category:'audio',price:89.99,rating:4.5,reviews:203,badge:'New',gradient:1},
  {id:9,name:'Laptop Stand',category:'accessories',price:44.99,rating:4.6,reviews:156,badge:null,gradient:2},
  {id:10,name:'Code Editor Theme Pack',category:'software',price:19.99,rating:4.1,reviews:67,badge:null,gradient:3},
  {id:11,name:'Webcam HD 4K',category:'electronics',price:129.99,oldPrice:159.99,rating:4.4,reviews:278,badge:'Sale',gradient:4},
  {id:12,name:'Studio Microphone',category:'audio',price:159.99,rating:4.7,reviews:321,badge:null,gradient:5}
];
let cart=new Set();
let filteredProducts=[...products];
function starSVG(filled){
  return `<svg class="star" viewBox="0 0 24 24" fill="${filled?'var(--star)':'none'}" stroke="var(--star)" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
}
function renderStars(rating){
  let html='';
  for(let i=1;i<=5;i++){html+=starSVG(i<=Math.round(rating))}
  return html;
}
function renderProducts(){
  const grid=document.getElementById('productGrid');
  grid.innerHTML='';
  filteredProducts.forEach(p=>{
    const card=document.createElement('div');
    card.className='product-card';
    const inCart=cart.has(p.id);
    card.innerHTML=`
      <div class="product-img" style="background:linear-gradient(${gradients[p.gradient]})">${p.badge?`<span class="product-badge">${p.badge}</span>`:''}Product Image</div>
      <div class="product-body">
        <div class="product-category">${p.category}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-rating">${renderStars(p.rating)}<span class="rating-count">(${p.reviews})</span></div>
        <div class="product-price">
          <div><span class="price">$${p.price.toFixed(2)}</span>${p.oldPrice?`<span class="price-old">$${p.oldPrice.toFixed(2)}</span>`:''}</div>
          <button class="add-btn${inCart?' added':''}" onclick="toggleCart(${p.id},this)">${inCart?'Added':'Add to Cart'}</button>
        </div>
      </div>`;
    grid.appendChild(card);
  });
  document.getElementById('resultCount').textContent=filteredProducts.length+' product'+(filteredProducts.length!==1?'s':'');
}
function toggleCart(id,btn){
  if(cart.has(id)){cart.delete(id);btn.textContent='Add to Cart';btn.classList.remove('added')}
  else{cart.add(id);btn.textContent='Added';btn.classList.add('added')}
  document.getElementById('cartCount').textContent=cart.size;
}
function filterProducts(e){
  const allCb=document.querySelector('[data-cat="all"]');
  const catCbs=document.querySelectorAll('[data-cat]:not([data-cat="all"])');
  if(e&&e.target){
    const clicked=e.target;
    if(clicked.dataset.cat==='all'&&clicked.checked){
      catCbs.forEach(c=>c.checked=false);
    }else if(clicked.dataset.cat!=='all'&&clicked.checked){
      allCb.checked=false;
    }
  }
  const checkedCats=[...catCbs].filter(c=>c.checked).map(c=>c.dataset.cat);
  if(checkedCats.length===0){allCb.checked=true}
  const min=parseFloat(document.getElementById('priceMin').value)||0;
  const max=parseFloat(document.getElementById('priceMax').value)||Infinity;
  if(allCb.checked){
    filteredProducts=products.filter(p=>p.price>=min&&p.price<=max);
  }else{
    filteredProducts=products.filter(p=>checkedCats.includes(p.category)&&p.price>=min&&p.price<=max);
  }
  sortProducts();
}
function sortProducts(){
  const sort=document.getElementById('sortSelect').value;
  if(sort==='price-low')filteredProducts.sort((a,b)=>a.price-b.price);
  else if(sort==='price-high')filteredProducts.sort((a,b)=>b.price-a.price);
  else if(sort==='rating')filteredProducts.sort((a,b)=>b.rating-a.rating);
  else filteredProducts.sort((a,b)=>a.id-b.id);
  renderProducts();
}
if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches){document.body.classList.add('dark')}
function toggleTheme(){document.body.classList.toggle('dark')}
function toggleSource(){
  const s=document.getElementById('sourceSection');s.classList.toggle('visible');
  if(s.classList.contains('visible')&&!s.dataset.loaded){document.getElementById('sourceCode').textContent=document.documentElement.outerHTML;s.dataset.loaded='1'}
}
renderProducts();
</script>
</body>
</html>

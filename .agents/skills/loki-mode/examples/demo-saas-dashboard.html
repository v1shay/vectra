<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Analytics Dashboard - Loki Mode Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8f7fc;--surface:#fff;--text:#1a1a2e;--muted:#6b7280;--primary:#7c3aed;--primary-light:#a78bfa;--teal:#0d9488;--border:#e5e7eb;--card-shadow:0 1px 3px rgba(0,0,0,.08)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body.dark{--bg:#0f0e17;--surface:#1a1928;--text:#e5e5eb;--muted:#9ca3af;--border:#2d2b3d;--card-shadow:0 1px 3px rgba(0,0,0,.3)}
header{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:var(--surface);border-bottom:1px solid var(--border)}
.logo{font-size:1.25rem;font-weight:700;color:var(--primary)}
nav{display:flex;gap:1.5rem}
nav a{text-decoration:none;color:var(--muted);font-size:.875rem;padding:.25rem 0;border-bottom:2px solid transparent;transition:all .2s}
nav a.active,nav a:hover{color:var(--primary);border-color:var(--primary)}
.header-right{display:flex;align-items:center;gap:1rem}
.theme-toggle{background:none;border:1px solid var(--border);border-radius:6px;padding:.375rem .75rem;cursor:pointer;color:var(--text);font-size:.75rem}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--teal));display:flex;align-items:center;justify-content:center;color:#fff;font-size:.75rem;font-weight:600}
.container{max-width:1200px;margin:0 auto;padding:1.5rem}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem;margin-bottom:1.5rem}
.kpi-card{background:var(--surface);border-radius:12px;padding:1.25rem;box-shadow:var(--card-shadow);border:1px solid var(--border)}
.kpi-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.25rem}
.kpi-value{font-size:1.75rem;font-weight:700}
.kpi-change{font-size:.75rem;margin-top:.25rem}
.kpi-change.up{color:#059669}
.kpi-change.down{color:#dc2626}
.sparkline{margin-top:.5rem}
.chart-section{background:var(--surface);border-radius:12px;padding:1.5rem;box-shadow:var(--card-shadow);border:1px solid var(--border);margin-bottom:1.5rem}
.chart-title{font-size:1rem;font-weight:600;margin-bottom:1rem}
.chart-svg{width:100%;height:auto}
.activity-section{background:var(--surface);border-radius:12px;padding:1.5rem;box-shadow:var(--card-shadow);border:1px solid var(--border)}
.activity-title{font-size:1rem;font-weight:600;margin-bottom:1rem}
.activity-item{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem 0;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.activity-dot.purple{background:var(--primary)}
.activity-dot.teal{background:var(--teal)}
.activity-dot.gray{background:var(--muted)}
.activity-text{font-size:.875rem;line-height:1.4}
.activity-time{font-size:.75rem;color:var(--muted);margin-top:.125rem}
.source-toggle{position:fixed;bottom:1rem;right:1rem;background:var(--primary);color:#fff;border:none;padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.75rem;z-index:10}
.source-section{display:none;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-top:1rem;max-height:300px;overflow:auto}
.source-section.visible{display:block}
.source-section pre{font-size:.7rem;white-space:pre-wrap;word-break:break-all;color:var(--muted)}
footer{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.75rem}
@media(max-width:768px){header{flex-wrap:wrap;gap:.5rem}nav{gap:.75rem}.container{padding:1rem}}
</style>
</head>
<body>
<header>
  <div class="logo">Acme Analytics</div>
  <nav>
    <a href="#" class="active">Dashboard</a>
    <a href="#">Customers</a>
    <a href="#">Revenue</a>
    <a href="#">Settings</a>
  </nav>
  <div class="header-right">
    <button class="theme-toggle" onclick="toggleTheme()">Dark / Light</button>
    <div class="avatar">JD</div>
  </div>
</header>
<div class="container">
  <div class="kpi-grid" id="kpiGrid"></div>
  <div class="chart-section">
    <div class="chart-title">Monthly Revenue</div>
    <svg class="chart-svg" viewBox="0 0 800 250" id="revenueChart"></svg>
  </div>
  <div class="activity-section">
    <div class="activity-title">Recent Activity</div>
    <div id="activityFeed"></div>
  </div>
</div>
<button class="source-toggle" onclick="toggleSource()">View Source</button>
<div class="container">
  <div class="source-section" id="sourceSection">
    <pre id="sourceCode"></pre>
  </div>
</div>
<footer>Built with Loki Mode in ~3 minutes</footer>
<script>
const kpis=[
  {label:'Revenue',value:'$84,230',change:'+12.5% vs last month',up:true,data:[30,35,28,42,38,45,50,48,55,60,58,65]},
  {label:'Active Users',value:'12,847',change:'+8.2% vs last month',up:true,data:[40,42,38,45,50,48,52,55,53,58,60,63]},
  {label:'Conversion',value:'3.24%',change:'-0.3% vs last month',up:false,data:[50,48,52,47,45,48,42,44,40,43,38,42]},
  {label:'MRR',value:'$142,500',change:'+15.1% vs last month',up:true,data:[20,25,28,32,35,38,42,48,52,58,62,68]}
];
function sparkline(data,color){
  const w=120,h=30,max=Math.max(...data),min=Math.min(...data);
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/(max-min))*h}`).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
const grid=document.getElementById('kpiGrid');
kpis.forEach(k=>{
  const card=document.createElement('div');
  card.className='kpi-card';
  card.innerHTML=`<div class="kpi-label">${k.label}</div><div class="kpi-value">${k.value}</div><div class="kpi-change ${k.up?'up':'down'}">${k.change}</div><div class="sparkline">${sparkline(k.data,k.up?'#059669':'#dc2626')}</div>`;
  grid.appendChild(card);
});
// Revenue chart
const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const rev=[42,48,55,52,68,72,78,85,82,90,95,102];
const svg=document.getElementById('revenueChart');
const cw=800,ch=250,pad={t:20,r:20,b:40,l:60};
const pw=cw-pad.l-pad.r,ph=ch-pad.t-pad.b;
const maxR=Math.max(...rev),minR=Math.min(...rev)*0.8;
let pathD='';
rev.forEach((v,i)=>{
  const x=pad.l+(i/(rev.length-1))*pw;
  const y=pad.t+ph-(((v-minR)/(maxR-minR))*ph);
  pathD+=(i===0?'M':'L')+`${x},${y}`;
});
const areaD=pathD+`L${pad.l+pw},${pad.t+ph}L${pad.l},${pad.t+ph}Z`;
svg.innerHTML=`
  <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7c3aed" stop-opacity=".3"/><stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/></linearGradient></defs>
  <path d="${areaD}" fill="url(#ag)"/>
  <path d="${pathD}" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  ${rev.map((v,i)=>{const x=pad.l+(i/(rev.length-1))*pw;const y=pad.t+ph-(((v-minR)/(maxR-minR))*ph);return`<circle cx="${x}" cy="${y}" r="3.5" fill="#7c3aed" stroke="#fff" stroke-width="1.5"/>`}).join('')}
  ${months.map((m,i)=>`<text x="${pad.l+(i/(months.length-1))*pw}" y="${ch-10}" text-anchor="middle" fill="var(--muted)" font-size="11">${m}</text>`).join('')}
  ${[40,60,80,100].map(v=>{const y=pad.t+ph-(((v-minR)/(maxR-minR))*ph);return`<line x1="${pad.l}" y1="${y}" x2="${pad.l+pw}" y2="${y}" stroke="var(--border)" stroke-dasharray="4"/><text x="${pad.l-8}" y="${y+4}" text-anchor="end" fill="var(--muted)" font-size="11">$${v}k</text>`}).join('')}
`;
// Activity feed
const activities=[
  {text:'New enterprise deal closed - Acme Corp ($24,500/yr)',time:'2 minutes ago',dot:'purple'},
  {text:'User milestone: 10,000th signup this quarter',time:'15 minutes ago',dot:'teal'},
  {text:'Monthly report generated and sent to stakeholders',time:'1 hour ago',dot:'gray'},
  {text:'Payment processed: Invoice #4821 - $3,200',time:'2 hours ago',dot:'purple'},
  {text:'New feature deployed: Advanced analytics filters',time:'4 hours ago',dot:'teal'}
];
const feed=document.getElementById('activityFeed');
activities.forEach(a=>{
  const item=document.createElement('div');
  item.className='activity-item';
  item.innerHTML=`<div class="activity-dot ${a.dot}"></div><div><div class="activity-text">${a.text}</div><div class="activity-time">${a.time}</div></div>`;
  feed.appendChild(item);
});
if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches){document.body.classList.add('dark')}
function toggleTheme(){document.body.classList.toggle('dark')}
function toggleSource(){
  const s=document.getElementById('sourceSection');
  s.classList.toggle('visible');
  if(s.classList.contains('visible')&&!s.dataset.loaded){
    document.getElementById('sourceCode').textContent=document.documentElement.outerHTML;
    s.dataset.loaded='1';
  }
}
</script>
</body>
</html>
